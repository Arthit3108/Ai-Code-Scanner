name: "AI Code Scanner"
description: "AI-powered code vulnerability scanner"
author: "Arthit3108"

inputs:
  gemini_api_key:
    description: "Gemini API Key"
    required: true
  target:
    description: "Target directory to scan"
    required: false
    default: "."
  severity:
    description: "Severity level to scan"
    required: false
    default: "HIGH,CRITICAL"
  output_type:
    description: "Output format (json or sarif)"
    required: false
    default: "json"
  fail_on_critical:
    description: "Fail on critical vulnerabilities"
    required: false
    default: "true"
  fail_on_high:
    description: "Fail on high vulnerabilities"
    required: false
    default: "true"
  fail_on_medium:
    description: "Fail on medium vulnerabilities"
    required: false
    default: "false"
  fail_on_low:
    description: "Fail on low vulnerabilities"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Install Gitleaks
      uses: gitleaks/gitleaks-action@v2
      with:
        install-only: true

    - name: Install Trivy
      shell: bash
      run: |
        curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

    - name: Download Scanner Binary
      shell: bash
      run: |
        mkdir -p $HOME/bin
        VERSION="${{ github.action_ref }}"
        if [ -z "$VERSION" ]; then
          VERSION="v1"
        fi
        echo "Downloading version $VERSION"
        curl -L -H "Authorization: token ${{ github.token }}"\
         https://github.com/Arthit3108/ai-code-scanner/releases/download/$VERSION/ai-scanner \
          -o $HOME/bin/ai-scanner
        chmod +x $HOME/bin/ai-scanner
        echo "$HOME/bin" >> $GITHUB_PATH

    - name: Run Scan
      id: scan
      shell: bash
      env:
        GEMINI_API_KEY: ${{ inputs.gemini_api_key }}
      run: |
        OUTPUT_FILE="report.json"
        if [ "${{ inputs.output_type }}" == "sarif" ]; then
          OUTPUT_FILE="results.sarif"
        fi

        ai-scanner scan \
          --target ${{ inputs.target }} \
          --severity ${{ inputs.severity }} \
          --output-type ${{ inputs.output_type }} \
          --output $OUTPUT_FILE

        echo "report_path=$OUTPUT_FILE" >> $GITHUB_OUTPUT

    - name: Upload SARIF to GitHub
      if: inputs.output_type == 'sarif'
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: results.sarif

    - name: Upload Report Artifact
      uses: actions/upload-artifact@v4
      with:
        name: security-report
        path: ${{ steps.scan.outputs.report_path }}

    - name: Check Vulnerabilities
      shell: bash
      env:
        FAIL_ON_CRITICAL: ${{ inputs.fail_on_critical }}
        FAIL_ON_HIGH: ${{ inputs.fail_on_high }}
        FAIL_ON_MEDIUM: ${{ inputs.fail_on_medium }}
        FAIL_ON_LOW: ${{ inputs.fail_on_low }}
        REPORT_FILE: ${{ steps.scan.outputs.report_path }}
      run: |
        # Only check vulnerabilities if we have a JSON report
        if [[ "$REPORT_FILE" != *.json ]]; then
          echo "Skipping threshold check: report is not in JSON format"
          exit 0
        fi

        FAILED=0

        check() {
          local LEVEL=$1
          local FLAG=$2
          if [ "$FLAG" == "true" ]; then
            COUNT=$(jq --arg s "$LEVEL" '[.[] | select(.severity == $s)] | length' "$REPORT_FILE")
            if [ "$COUNT" -gt 0 ]; then
              FAILED=1
            fi
          fi
        }

        check "CRITICAL" "$FAIL_ON_CRITICAL"
        check "HIGH"     "$FAIL_ON_HIGH"
        check "MEDIUM"   "$FAIL_ON_MEDIUM"
        check "LOW"      "$FAIL_ON_LOW"

        if [ "$FAILED" -eq 1 ]; then
          exit 1
        fi
